# Description:
#   Builds the VLE solution, regenerates the test-file manifest, and validates
#   that every JSON snapshot file under tests/snapshots can be parsed. This is
#   a lightweight headless CI guard for snapshot/manifest health.

name: Validate VLE Snapshot Manifests

on:
  pull_request:
  push:

jobs:
  validate-snapshots:
    name: Validate manifest and snapshot JSON
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Locate MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build Solution (Release)
        shell: pwsh
        run: |
          @echo Calling msbuild Configuration=Release

          msbuild .\VerilogLanguageExtension.sln /m /restore /p:Configuration=Release

      - name: Validate Manifest
        shell: pwsh
        run: |
          @echo Calling .\scripts\create-testfile-manifest.ps1

          .\scripts\create-testfile-manifest.ps1

      - name: Check snapshot JSON parses
        shell: pwsh
        run: |
          Get-ChildItem .\tests\snapshots -Recurse -Filter *.json |
              ForEach-Object {
                  Get-Content $_.FullName -Raw -Encoding UTF8 | ConvertFrom-Json | Out-Null
              }
