name: Build Verilog Language Extension

on:
    push:
        branches: [ main, development ]
    pull_request:
        branches: [ main, development ]
    workflow_dispatch:

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup MSBuild
              uses: microsoft/setup-msbuild@v2

            - name:  dotnet list
              shell: cmd
              run: |
                dotnet list .\VerilogLanguage.csproj package --include-transitive

            - name: Build solution
              shell: cmd
              run: |
                  echo Build...
                  msbuild VerilogLanguageExtension.sln ^
                  /restore ^
                  /t:Rebuild ^
                  /p:Configuration=Release ^
                  /p:Platform="Any CPU" ^
                  /p:VisualStudioVersion=17.0
