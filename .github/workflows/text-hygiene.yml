#
# Description:
#   Checks repository text hygiene rules, including UTF-8 without BOM, CRLF line
#   endings, final newlines, and disallowed characters. Some upstream/reference
#   files are intentionally excluded because they do not follow repository text
#   hygiene conventions.

name: Check Repository Text Hygiene

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  text-hygiene:
    name: Check Repository Text Hygiene
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Check UTF-8, line endings, and bad characters
        shell: pwsh
        run: |
          $excludePath = @(
              'CODE_OF_CONDUCT.md'
              'Lattice_securelyfitz.md'
              'LICENSE.md'
          )

          $checkArgs = @{
              RequireNoBom = $true
              RequireCrLf = $true
              RequireFinalNewline = $true
              MaxFailures = 0
              ExcludePath = $excludePath
          }

          .\tools\check-text-hygiene.ps1 @checkArgs
