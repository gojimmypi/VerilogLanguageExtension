name: Text hygiene

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  text-hygiene:
    name: Text hygiene
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check UTF-8, line endings, and bad characters
        shell: pwsh
        run: |
          $excludePath = @(
              'CODE_OF_CONDUCT.md'
              'Lattice_securelyfitz.md'
              'LICENSE.md'
          )

          $checkArgs = @{
              RequireNoBom = $true
              RequireCrLf = $true
              RequireFinalNewline = $true
              ExcludePath = $excludePath
          }

          .\tools\check-text-hygiene.ps1 @checkArgs
