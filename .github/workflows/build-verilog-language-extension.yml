name: Build Verilog Language Extension

on:
    push:
        branches: [ main, development ]
    pull_request:
        branches: [ main, development ]
    workflow_dispatch:

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup MSBuild
              uses: microsoft/setup-msbuild@v2

            - name: Setup VS Developer Command Prompt
              uses: microsoft/setup-vsdevcmd@v2
              with:
                  vs-version: "17.0"

            - name: Build solution
              run: >
                  msbuild VerilogLanguageExtension.sln
                  /restore
                  /t:Rebuild
                  /p:Configuration=Release
                  /p:Platform="Any CPU"
                  /p:VisualStudioVersion=17.0
