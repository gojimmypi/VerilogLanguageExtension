name: Build Verilog Language Extension

on:
#  push:
#    branches: [ main ]
#
#  pull_request:
#    branches: [ main ]

  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected VLE release version, for example 0.4.1.4
        required: false
        type: string

jobs:
  build:
    runs-on: windows-2022

    env:
      Configuration: Release
      # There is both a solution and project file, so explicitly name the solution.
      SolutionPath: VerilogLanguageExtension.sln
      VsixManifestPath: source.extension.vsixmanifest
      BaselinePath: tests/snapshots/baselines/development-main/all-testfiles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: Show Visual Studio/MSBuild
        shell: cmd
        run: |
          where msbuild
          msbuild -version
          "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VSSDK -property installationPath

      - name: dotnet list
        shell: cmd
        run: |
          dotnet list .\VerilogLanguage.csproj package --include-transitive

      - name: Report VLE version metadata
        shell: pwsh
        run: |
          .\tools\vle-ci\Get-VleVersionInfo.ps1 -AsJson | Tee-Object -FilePath vle-version-info.json

      - name: Check VLE release metadata
        shell: pwsh
        run: |
          $expected = "${{ github.event.inputs.expected_version }}"

          # Tags named like v0.4.1.4 are treated as release version gates.
          if ([string]::IsNullOrWhiteSpace($expected) -and $env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -match '^v(.+)$') {
              $expected = $Matches[1]
          }

          if ([string]::IsNullOrWhiteSpace($expected)) {
              .\tools\vle-ci\Assert-VleReleaseInfo.ps1
          }
          else {
              .\tools\vle-ci\Assert-VleReleaseInfo.ps1 -ExpectedVersion $expected
          }

      - name: Check approved baseline release metadata
        shell: pwsh
        run: |
          .\tools\vle-ci\Assert-SnapshotBaselineVersion.ps1 -BaselineDir $env:BaselinePath

      - name: Build solution
        shell: cmd
        run: |
          echo Build...
          msbuild %SolutionPath% ^
            /restore ^
            /t:Rebuild ^
            /p:Configuration=%Configuration% ^
            /p:Platform="Any CPU" ^
            /p:VisualStudioVersion=17.0

      - name: Upload VLE version report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vle-version-info
          path: vle-version-info.json

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: VerilogLanguage.vsix
          path: |
            **\bin\Release\*.vsix
