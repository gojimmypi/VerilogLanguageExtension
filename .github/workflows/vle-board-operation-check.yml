name: VLE board operation check

on:
  push:
    branches: [ main, master, development-main, code_polish ]
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Check mode"
        required: false
        default: "Static"
        type: choice
        options:
          - Static
          - Build
          - Hardware
          - All
      project_path:
        description: "Project file to test"
        required: false
        default: "AddedExtensionProjectTemplates/VerilogProject/VerilogProject.csproj"
        type: string

permissions:
  contents: read

jobs:
  board-operation-check:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run board operation check
        shell: pwsh
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_PROJECT_PATH: ${{ github.event.inputs.project_path }}
        run: |
          $mode = $env:INPUT_MODE
          if ([string]::IsNullOrWhiteSpace($mode)) {
              $mode = 'Static'
          }

          $projectPath = $env:INPUT_PROJECT_PATH
          if ([string]::IsNullOrWhiteSpace($projectPath)) {
              $projectPath = 'AddedExtensionProjectTemplates/VerilogProject/VerilogProject.csproj'
          }

          New-Item -ItemType Directory -Force artifacts/vle-board-operation-check | Out-Null

          pwsh -NoProfile `
              -ExecutionPolicy Bypass `
              -File scripts/test-vle-board-operations.ps1 `
              -ProjectPath $projectPath `
              -Mode $mode `
              -LogDirectory artifacts/vle-board-operation-check

      - name: Upload check logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vle-board-operation-check
          path: artifacts/vle-board-operation-check
